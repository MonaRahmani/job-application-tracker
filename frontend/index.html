<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Job Application Tracker</h1>
        <div id="account-bar" hidden>
            <span id="current-user"></span>
            <button type="button" id="logout-button">Log out</button>
        </div>
    </header>

    <p id="message" role="status" aria-live="polite"></p>

    <main>
        <section id="auth-section" aria-labelledby="auth-heading">
            <h2 id="auth-heading">Log in or create an account</h2>
            <form id="auth-form">
                <div>
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" autocomplete="email" required />
                </div>
                <div>
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" autocomplete="current-password" minlength="8" required />
                </div>
                <div class="auth-actions">
                    <button type="submit" data-action="login">Log in</button>
                    <button type="submit" data-action="register">Create account</button>
                </div>
            </form>
        </section>

        <div id="tracker-section" hidden>
            <section aria-labelledby="application-form-heading">
                <h2 id="application-form-heading">Add New Application</h2>
                <form id="application-form">
                    <div><label for="company">Company</label><input type="text" id="company" required /></div>
                    <div><label for="position">Position</label><input type="text" id="position" required /></div>
                    <div><label for="date-applied">Date Applied</label><input type="date" id="date-applied" /></div>
                    <div>
                        <label for="status">Status</label>
                        <select id="status">
                            <option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option>
                        </select>
                    </div>
                    <div><label for="notes">Notes</label><textarea id="notes" rows="3"></textarea></div>
                    <button type="submit" id="submit-application">Add Application</button>
                </form>
            </section>

            <section aria-labelledby="filter-heading">
                <h2 id="filter-heading">Filters</h2>
                <label for="status-filter">Filter by Status:</label>
                <select id="status-filter">
                    <option>All</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option>
                </select>
            </section>

            <section aria-labelledby="table-heading">
                <h2 id="table-heading">Applications</h2>
                <div class="table-wrapper">
                    <table id="applications-table">
                        <thead><tr><th>Company</th><th>Position</th><th>Date Applied</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
                        <tbody id="applications-body"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
